{{define "tasks_list_body"}}
<div id="tasks-items" style="padding: 16px;">
    {{range .Tasks}}
    <div id="task-item-{{.Id}}" class="d-flex align-center justify-between" style="padding: 8px 0; border-bottom: 1px solid var(--color-border-muted);">
        <div class="d-flex align-center gap-2">
            {{if .IsCompleted}}
            <span style="color: var(--color-success-fg);">&#10003;</span>
            <span style="text-decoration: line-through; color: var(--color-fg-muted);">{{.Title}}</span>
            {{else}}
            <button class="btn btn-sm btn-outline" data-on-click="@post('/api/tasks/{{.Id}}/complete')">&#10003;</button>
            <span>{{.Title}}</span>
            {{end}}
            <span class="Label {{if eq .Priority "STAT"}}Label--danger{{else if eq .Priority "Urgent"}}Label--warning{{else}}Label--default{{end}}">{{.Priority}}</span>
            <span class="Label Label--default">{{.Category}}</span>
        </div>
        <div class="text-muted text-small">
            Due: {{.DueAt.Format "01/02 15:04"}}
        </div>
    </div>
    {{else}}
    <p class="text-muted" style="margin:0;">No tasks for this patient.</p>
    {{end}}
</div>
{{end}}
