{{template "base" .}}
{{define "content"}}
<div class="mb-3">
    <h1>{{.Patient.FullName}}</h1>
    <p class="text-muted">
        Room {{.Patient.RoomBed}} &bull; MRN: {{.Patient.MRN}}
    </p>
</div>

<nav class="d-flex gap-2 mb-3" style="border-bottom: 1px solid var(--color-border-default); padding-bottom: 8px;">
    <a href="/patients/{{.Patient.Id}}" class="btn btn-sm btn-outline">Profile</a>
    <a href="/patients/{{.Patient.Id}}/vitals" class="btn btn-sm btn-outline">Vitals</a>
    <a href="/patients/{{.Patient.Id}}/mar" class="btn btn-sm btn-primary">MAR</a>
    <a href="/patients/{{.Patient.Id}}/tasks" class="btn btn-sm btn-outline">Tasks</a>
</nav>

<div class="Box mb-3">
    <div class="Box-header">Administer Medication</div>
    <div class="Box-body">
        <form data-signals="{medicationId: '', dose: '', route: 'PO'}"
              data-on-submit__prevent="@post('/api/patients/{{.Patient.Id}}/mar')">
            <div class="grid grid-cols-3">
                <div class="form-group">
                    <label>Medication</label>
                    <select data-bind-medicationId>
                        <option value="">Select medication...</option>
                        {{range .Medications}}
                        <option value="{{.Id}}">{{.Name}}{{if .BrandName}} ({{.BrandName}}){{end}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label>Dose</label>
                    <input type="text" data-bind-dose placeholder="e.g. 500mg">
                </div>
                <div class="form-group">
                    <label>Route</label>
                    <select data-bind-route>
                        <option value="PO">PO</option>
                        <option value="IV">IV</option>
                        <option value="IM">IM</option>
                        <option value="SQ">SQ</option>
                        <option value="SL">SL</option>
                        <option value="Topical">Topical</option>
                        <option value="Inhaled">Inhaled</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" data-indicator-administering data-attr-aria-busy="$administering" data-attr-disabled="$administering">
                Administer Now
            </button>
        </form>
    </div>
</div>

<div class="Box">
    <div class="Box-header">Medication Administration Record</div>
    <div id="mar-history"
         data-on-load="@get('/api/patients/{{.Patient.Id}}/mar/stream')">
        <table>
            <thead>
                <tr>
                    <th>Medication</th>
                    <th>Dose</th>
                    <th>Route</th>
                    <th>Scheduled</th>
                    <th>Administered</th>
                    <th>Status</th>
                    <th>Notes</th>
                </tr>
            </thead>
            {{template "mar_table_body" .}}
        </table>
    </div>
</div>
{{end}}
